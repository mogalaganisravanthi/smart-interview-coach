
<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Mock Interview</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

</head>

<body>

<nav class="navbar">

<h2>🌸 Smart Interview Coach</h2>

<ul>
<li><a href="dashboard.html">Dashboard</a></li>
<li><a href="profile.html">Profile</a></li>
</ul>

</nav>

<div class="interview-page">

<h1 class="title">🤖 AI Mock Interview</h1>

<h2 id="question"></h2>

<div class="interview-layout">

<div class="left-panel">

<h3>📌 Cover these points</h3>

<ul id="points"></ul>

</div>

<div class="right-panel">

<button id="startBtn">🎤 Start Speaking</button>

<button id="stopBtn">🛑 Stop Speaking</button>

<h3>Your Answer</h3>

<div id="transcript">
Start speaking... Your answer will appear here.
</div>

<button id="analyzeBtn">Analyze Answer</button>

</div>

</div>

</div>

<script src="interviewData.js"></script>
<script src="speech.js"></script>
<script src="analyzer.js"></script>

<script>

let currentQuestion = 0;

document.getElementById("question").innerHTML =
interviewQuestions[currentQuestion].question;

const list = document.getElementById("points");

interviewQuestions[currentQuestion].points.forEach(point=>{

const li=document.createElement("li");

li.innerHTML="✅ "+point;

list.appendChild(li);

});

</script>

</body>

</html>
